name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install qt libmsquic

      - name: Generate dev TLS certificates
        run: ./scripts/generate_dev_certs.sh

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" -DBUILD_GUI=ON -DBUILD_TESTS=OFF
          cmake --build build --target lft_gui

      - name: Bundle Qt into app
        run: |
          QT_BIN="$(brew --prefix qt)/bin/macdeployqt"
          "$QT_BIN" build/src/gui/lft_gui.app -always-overwrite

      - name: Package
        run: |
          ditto -c -k --keepParent build/src/gui/lft_gui.app LFT-macos.zip
          hdiutil create -volname LFT -srcfolder build/src/gui/lft_gui.app -ov -format UDZO LFT-macos.dmg

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LFT-macos.zip
            LFT-macos.dmg
          generate_release_notes: true
