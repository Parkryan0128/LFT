name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install qt libmsquic

      - name: Generate dev TLS certificates
        run: ./scripts/generate_dev_certs.sh

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
            -DBUILD_GUI=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_MSQUIC_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        # Skip the 5M-packet legacy UDP stress test (slow/flaky on shared runners).
        run: ctest --test-dir build --output-on-failure -j1 -E "Legacy.Checkpoint1"
